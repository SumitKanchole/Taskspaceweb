[build]
  command = "pnpm run build"
  publish = "artifacts/workspace-app/dist/public"

[build.environment]
  NODE_VERSION = "20"
  PNPM_FLAGS = "--shamefully-hoist"

# ---------------------------------------------------------------------------
# API Proxy — The permanent fix for CORS
# ---------------------------------------------------------------------------
# All /api/* requests from the browser go to Netlify (same origin).
# Netlify then server-side proxies them to Railway.
# The browser NEVER sees a cross-origin request → CORS is completely bypassed.
#
# status = 200 means Netlify PROXIES (not redirects) the request.
# force = true ensures this runs even if a matching file exists.
# ---------------------------------------------------------------------------
[[redirects]]
  from = "/api/*"
  to = "https://happy-consideration-production.up.railway.app/api/:splat"
  status = 200
  force = true

# SPA fallback — must come AFTER the /api/* rule
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
